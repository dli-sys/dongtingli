    <div class="gallery reveal">
      <figure class="gitem" tabindex="0"><img loading="lazy" src="assets/gallery/g01.jpg" alt="UCSD Jacobs Hall at dusk" /><figcaption>@ UCSD Jacobs Hall. Is this a morning or a night?</figcaption></figure>
      <figure class="gitem" tabindex="0"><img loading="lazy" src="assets/gallery/g02.jpg" alt="Scripps Pier at sunset" /><figcaption>@ San Diego, CA — UCSD Scripps Pier.</figcaption></figure>
      <figure class="gitem" tabindex="0"><img loading="lazy" src="assets/gallery/g03.jpg" alt="Foggy resort morning in Dana Point" /><figcaption>@ Dana Point, CA. A foggy morning, on my first visit to San Diego.</figcaption></figure>
      <figure class="gitem" tabindex="0"><img loading="lazy" src="assets/gallery/g04.jpg" alt="Space Needle in Seattle" /><figcaption>@ Seattle, WA.</figcaption></figure>
      <figure class="gitem" tabindex="0"><img loading="lazy" src="assets/gallery/g05.jpg" alt="Cloud shaped like a phoenix over Gilbert, Arizona" /><figcaption>@ Gilbert, AZ. I found a cloud that looks like a phoenix.</figcaption></figure>
      <figure class="gitem" tabindex="0"><img loading="lazy" src="assets/gallery/g06.jpg" alt="Purple and pink sunset sky in Gilbert, Arizona" /><figcaption>@ Gilbert, AZ. One thing I really love about Arizona is the sunset — I miss those purple skies.</figcaption></figure>
      <figure class="gitem" tabindex="0"><img loading="lazy" src="assets/gallery/g07.jpg" alt="Desert stone labyrinth near Tucson" /><figcaption>@ Tucson, AZ. It was a dark time for me, and I was trying to find some peace.</figcaption></figure>
      <figure class="gitem" tabindex="0"><img loading="lazy" src="assets/gallery/g08.jpg" alt="Southwest plane and PHX Sky Train at Phoenix Sky Harbor" /><figcaption>@ Phoenix Sky Harbor Airport.</figcaption></figure>

      <figure class="gitem" tabindex="0"><img loading="lazy" src="assets/gallery/g12.jpg" alt="Desert garden below a mountain near Camelback" /><figcaption>@ Camelback Mountain, AZ. May 2022.</figcaption></figure>
